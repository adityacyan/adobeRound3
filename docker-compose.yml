version: '3.8'

services:
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - ADOBE_EMBED_API_KEY=${ADOBE_EMBED_API_KEY:-}
      # Service Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - SESSION_TIMEOUT_HOURS=${SESSION_TIMEOUT_HOURS:-4}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - SPEED_PRIORITY=${SPEED_PRIORITY:-high}
      - ACCURACY_MINIMUM=${ACCURACY_MINIMUM:-0.85}
      # TTS Configuration
      - GEMINI_TTS_MODEL=${GEMINI_TTS_MODEL:-gemini-2.5-flash-lite-preview-tts}
      - GEMINI_TTS_HOST_VOICE=${GEMINI_TTS_HOST_VOICE:-Kore}
      - GEMINI_TTS_GUEST_VOICE=${GEMINI_TTS_GUEST_VOICE:-Puck}
    volumes:
      - ./credentials:/credentials:ro
    expose:
      - "8000"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    networks:
      - app-network
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - with-redis

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
