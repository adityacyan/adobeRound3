version: '3.8'

services:
  pdf-workbench:
    build: .
    ports:
      - "8080:8080"  # Streamlit frontend
      - "8000:8000"  # FastAPI backend (for direct API access)
    environment:
      - STREAMLIT_SERVER_PORT=8080
      - FASTAPI_BACKEND_PORT=8000
      - SESSION_TIMEOUT_HOURS=4
      - SPEED_PRIORITY=high
      - ACCURACY_MINIMUM=0.85
    volumes:
      - ./credentials:/home/app/credentials:ro
      - ./.env:/home/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional Redis service for caching (can be enabled later)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - with-redis

volumes:
  redis_data: