version: '3.8'

services:
  pdf-workbench:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080" # React frontend + API proxy
    environment:
      - ADOBE_EMBED_API_KEY=${ADOBE_EMBED_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/credentials/adbe-gcp.json}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - TTS_PROVIDER=${TTS_PROVIDER:-azure}
      - AZURE_TTS_KEY=${AZURE_TTS_KEY:-}
      - AZURE_TTS_ENDPOINT=${AZURE_TTS_ENDPOINT:-}
    volumes:
      - ./credentials:/credentials:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/", "&&", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional Redis service for caching (can be enabled later)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - with-redis

volumes:
  redis_data:
